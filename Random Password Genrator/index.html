<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Password </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Generate a <br><span>Random Password</span></h2>
        <div class="display">
            <input type="text" id="password" placeholder="Password">
            <img src="images/copy.png" onclick="copyPassword()">
        </div>
        <button onclick="createPassword()"><img src="images/generate.png">Generate Password</button>
    </div>
    
</body>
<script>
    const passwordBox=document.getElementById("password")
    const length=12;
    const upperCase="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const lowerCase="abcdefghijklmnopqrstuvwxyz";
    const number="0123456789";
    const symbol="[]_=*%$#@!~(){}<>,.?/':";
    const allChars=upperCase + lowerCase + number + symbol;

    function createPassword(){
        let password=""
        password+=upperCase[Math.floor(Math.random()*upperCase.length)]
        password+=lowerCase[Math.floor(Math.random()*lowerCase.length)]
        password+=number[Math.floor(Math.random()*number.length)]
        password+=symbol[Math.floor(Math.random()*symbol.length)]
        while (length > password.length) {
            password+=allChars[Math.floor(Math.random()*allChars.length)]
            
        }
        passwordBox.value=password;
    }

    function copyPassword(){
          passwordBox.select();
          document.execCommand("cut")
          alert("password is copied")
    }


//     document.execCommand("copy")   // copy selected text
// document.execCommand("cut")    // cut selected text
// document.execCommand("paste")  // paste text
// document.execCommand("bold")   // make text bold
// document.execCommand("italic") // make text italic
// document.execCommand("undo")   // undo action
// document.execCommand("redo")   // redo action
</script>
</html>
